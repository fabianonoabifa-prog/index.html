<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel de Dados</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f4f7f6; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #status { margin-bottom: 20px; color: #7f8c8d; font-style: italic; }
        table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #dfe6e9; padding: 12px; text-align: left; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <h1>📊 Painel de Informações</h1>
    <div id="status">Verificando atualizações...</div>
    <div id="tabela-container">Carregando dados da planilha...</div>

    <script>
        async function carregarDadosDoExcel() {
            // SUBSTITUA O LINK ABAIXO PELO SEU LINK RAW QUE VOCÊ CONSEGUIU COPIAR
            const urlBase = https://github.com/fabianonoabifa-prog/meu-painel-xml/raw/refs/heads/main/Lead%20Time.xlsx;
            
            // Adicionamos um número aleatório no final para forçar o navegador a pegar o arquivo novo
            const urlFinal = urlBase + '?t=' + new Date().getTime();

            try {
                const response = await fetch(urlFinal);
                if (!response.ok) throw new Error("Não foi possível acessar o arquivo.");
                
                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Pega a primeira aba
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Converte para HTML e exibe
                const htmlTable = XLSX.utils.sheet_to_html(worksheet);
                document.getElementById('tabela-container').innerHTML = htmlTable;
                
                const agora = new Date().toLocaleTimeString('pt-BR');
                document.getElementById('status').innerText = "Última leitura realizada às: " + agora;
            } catch (error) {
                document.getElementById('status').innerText = "Erro ao carregar: " + error.message;
                console.error(error);
            }
        }

        // Executa assim que a página abre
        carregarDadosDoExcel();

        // Configura para atualizar a tela a cada 1 hora (3600000 milissegundos)
        setInterval(carregarDadosDoExcel, 3600000);
    </script>
</body>
</html>
