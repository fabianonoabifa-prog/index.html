<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Dados Atualizado</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Informações do Excel</h1>
    <div id="status">Carregando dados...</div>
    <div id="tabela-container"></div>

    <script>
        async function carregarExcel() {
            // SUBSTITUA pelo seu link RAW do GitHub
            const url = https://github.com/fabianonoabifa-prog/meu-painel-xml/raw/refs/heads/main/Lead%20Time.xlsx;
            
            try {
                const response = await fetch(url);
                const data = await response.arrayBuffer();
                
                // Lendo o arquivo Excel
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Pegando a primeira aba (planilha)
                const primeiraAba = workbook.SheetNames[0];
                const planilha = workbook.Sheets[primeiraAba];
                
                // Convertendo para HTML
                const htmlTable = XLSX.utils.sheet_to_html(planilha);
                
                document.getElementById('tabela-container').innerHTML = htmlTable;
                document.getElementById('status').innerText = "Última atualização: " + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('status').innerText = "Erro ao carregar dados.";
                console.error(error);
            }
        }

        // Carrega ao abrir a página
        carregarExcel();
        
        // Recarrega automaticamente a cada 1 hora (3600000 ms)
        setInterval(carregarExcel, 3600000);
    </script>
</body>
</html>
